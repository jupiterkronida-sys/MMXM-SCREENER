version: "3.9"

services:
  mongo:
    image: mongo:7.0
    container_name: msmm-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: msmm_screener

  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    container_name: msmm-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./app/backend/.env
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=msmm_screener
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001,http://34.39.155.123:3001,http://34.39.155.123
      - SCAN_INTERVAL_SECONDS=120
      - TOP_N_SYMBOLS=300
    depends_on:
      - mongo

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    container_name: msmm-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:stable-alpine
    container_name: msmm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./app/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  mongo_data:
